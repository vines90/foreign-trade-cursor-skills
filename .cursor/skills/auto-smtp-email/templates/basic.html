<html>
  <body style="margin:0;padding:24px;background:#f6f7fb;font-family:Arial,Helvetica,sans-serif;color:#1f2937;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
      <tr>
        <td align="center">
          <table role="presentation" width="640" cellspacing="0" cellpadding="0" border="0" style="max-width:640px;background:#ffffff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;">
            <tr>
              <td style="padding:24px 28px 8px 28px;background:#111827;color:#ffffff;font-size:22px;font-weight:700;">
                {{email_title}}
              </td>
            </tr>
            <tr>
              <td style="padding:24px 28px;font-size:15px;line-height:1.8;">
                <p style="margin:0 0 16px 0;">Hello {{company_name}},</p>
                <p style="margin:0 0 16px 0;">{{body_text}}</p>
                <p style="margin:24px 0 0 0;color:#4b5563;">{{signature_html}}</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
